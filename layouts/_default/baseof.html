<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} – {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary }}{{ end }}">
  <link rel="icon" href="{{ "favicon.ico" | absURL }}" sizes="any">
  <link rel="icon" href="{{ "favicon-192.png" | absURL }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | absURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Strichpunkt+Sans:wdth,wght@200,500;100,300;100,400;100,500;100,600&display=swap" rel="stylesheet">
  {{ $css := resources.Get "css/main.css" | minify }}
  <style>{{ $css.Content | safeCSS }}</style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ "" | absURL }}" class="site-title">{{ .Site.Title }}</a>
    </nav>
  </header>
  <main>
    {{ if .IsHome }}<h1 class="sr-only">{{ .Site.Title }}</h1>{{ end }}
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <a href="{{ "imprint/" | absURL }}">Imprint</a>
    <a href="https://github.com/stefannegele" target="_blank" rel="noopener">GitHub</a>
  </footer>
</body>
</html>
