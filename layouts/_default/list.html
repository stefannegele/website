{{ define "main" }}
<div class="container">
  <h1 class="page-heading">{{ .Title }}</h1>
  <ul class="post-list">
  {{ range .Pages }}
  <li>
    <div class="post-card">
      <a href="{{ .Permalink }}">
        <div class="post-meta"><span>{{ .Date.Format "2. January 2006" }}</span></div>
        <div class="post-title">{{ .Title }}</div>
      </a>
    </div>
  </li>
  {{ end }}
  </ul>
</div>
{{ end }}
