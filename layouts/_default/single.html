{{ define "main" }}
<div class="container">
  {{ if .Params.external_url }}
    <div class="external-notice">
      Dieser Artikel erschien extern: <a href="{{ .Params.external_url }}" target="_blank" rel="noopener">{{ .Params.external_url }}</a>
    </div>
  {{ end }}
  <div class="post-header">
    <div class="post-meta">
      <span class="badge badge-{{ default "internal" .Params.source }}">
        {{ if eq .Params.source "external" }}External{{ else }}Artikel{{ end }}
      </span>
      <span>{{ .Date.Format "2. January 2006" }}</span>
      <a href="{{ .Site.BaseURL }}" style="color:var(--muted);">← Zurück</a>
    </div>
    <h1>{{ .Title }}</h1>
  </div>
  <div class="post-content">
    {{ .Content }}
  </div>
</div>
{{ end }}
