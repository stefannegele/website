{{template "base.html" .}}
{{define "content"}}
<main>
  <div class="container">
    <div class="post-header">
      <div class="post-meta" style="margin-bottom:1rem;">
        <span class="badge badge-{{.Post.Source}}">{{sourceLabel .Post.Source}}</span>
        <span>{{formatDate .Post.PublishedAt}}</span>
        <a href="/" style="color:var(--color-text-muted);">← Zurück</a>
      </div>
      <h1>{{.Post.Title}}</h1>
    </div>
    {{if .Post.Content}}
    <div class="post-content">{{.Post.Content}}</div>
    {{else}}
    <p style="color:var(--color-text-muted);">Kein Inhalt verfügbar.</p>
    {{end}}
  </div>
</main>
{{end}}
